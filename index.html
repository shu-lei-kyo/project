<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>PROJECT: You.exe</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff88;
    font-family:"Courier New", monospace;
    overflow-y:auto; 
    overflow-x:hidden; 
}

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

#terminal{
    padding:40px;
    max-width:900px;
}

button{
    /* GLASS PANEL (terminal) */
#terminal{
    padding:40px;
    max-width:900px;
    position:relative;
    z-index:1;

    /* glass */
    background:rgba(0, 15, 10, 0.35);
    border:1px solid rgba(0,255,136,0.25);
    border-radius:18px;
    box-shadow:
        0 0 25px rgba(0,255,136,0.10),
        inset 0 0 22px rgba(0,0,0,0.35);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
}

/* Nav layout */
.nav{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    margin-bottom:14px;
}

/* ICON + LABEL neon glass buttons */
.nav-btn{
    --glow:#00ff88;

    position:relative;
    display:inline-flex;
    align-items:center;
    gap:10px;

    padding:12px 16px;
    border-radius:14px;

    background:rgba(0,0,0,0.35);
    color:var(--glow);
    border:1px solid rgba(255,255,255,0.10);

    font-family:"Courier New", monospace;
    font-size:13px;
    letter-spacing:1px;
    text-transform:uppercase;

    cursor:pointer;
    user-select:none;
    overflow:hidden;

    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);

    box-shadow:
        0 0 0 1px rgba(0,0,0,0.35),
        0 0 14px rgba(0,0,0,0.35),
        0 0 16px color-mix(in srgb, var(--glow) 45%, transparent),
        inset 0 0 18px rgba(255,255,255,0.05);

    transition: transform .18s ease, box-shadow .25s ease, background .25s ease, color .25s ease;
}

.nav-btn .ico{
    width:22px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    filter: drop-shadow(0 0 6px color-mix(in srgb, var(--glow) 60%, transparent));
}

.nav-btn .label{
    white-space:nowrap;
}

/* Shimmer line */
.nav-btn::before{
    content:"";
    position:absolute;
    top:-40%;
    left:-120%;
    width:60%;
    height:180%;
    transform: rotate(20deg);
    background:linear-gradient(90deg,
        transparent,
        rgba(255,255,255,0.18),
        transparent
    );
    transition:left .6s ease;
}

.nav-btn:hover{
    transform: translateY(-2px);
    background:rgba(0,0,0,0.55);
    box-shadow:
        0 0 0 1px rgba(0,0,0,0.35),
        0 0 22px color-mix(in srgb, var(--glow) 55%, transparent),
        0 0 40px color-mix(in srgb, var(--glow) 35%, transparent),
        inset 0 0 22px rgba(255,255,255,0.06);
}

.nav-btn:hover::before{
    left:140%;
}

.nav-btn:active{
    transform: translateY(0px) scale(0.99);
}

/* ACTIVE = “yanıyor” */
.nav-btn.active{
    background: color-mix(in srgb, var(--glow) 12%, rgba(0,0,0,0.45));
    border-color: color-mix(in srgb, var(--glow) 60%, rgba(255,255,255,0.10));
    box-shadow:
        0 0 0 1px rgba(0,0,0,0.35),
        0 0 26px color-mix(in srgb, var(--glow) 70%, transparent),
        0 0 60px color-mix(in srgb, var(--glow) 45%, transparent),
        inset 0 0 26px color-mix(in srgb, var(--glow) 22%, transparent);
    animation: activePulse 1.25s ease-in-out infinite;
}

@keyframes activePulse{
  0%,100%{
    filter: brightness(1);
  }
  50%{
    filter: brightness(1.25);
  }
}
}

/* Tıklama efekti */
button:active{
    transform:translateY(1px);
    box-shadow:
        0 0 5px #00ff88,
        inset 0 0 15px rgba(0,0,0,0.8);
}

/* İçinden geçen animasyonlu ışık */
button::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(0,255,136,0.4),
        transparent
    );
    transition:0.6s;
}

button:hover::before{
    left:100%;
}

input{
    background:black;
    color:#00ff88;
    border:1px solid #00ff88;
    padding:6px;
}

.hidden{
    display:none;
}

/* Gallery grid */
.gallery-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    margin-top:15px;
}

.gallery-grid img{
    width:100%;
    border:1px solid #00ff88;
    transition:.3s;
}
.gallery-grid img:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #00ff88;
}

#memoriesText{
    white-space:pre-line;
}
</style>
</head>

<script>

// MATRIX EFFECT
var canvas=document.getElementById("matrix");
var ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

var letters="ILOVEYOU".split("");
var fontSize=14;
var columns=canvas.width/fontSize;
var drops=[];

for(var x=0;x<columns;x++) drops[x]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#004d29";
ctx.font=fontSize+"px monospace";

for(var i=0;i<drops.length;i++){
var text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}
setInterval(draw,33);


// TYPEWRITER
function typeWriter(element,text,speed){
let i=0;
function typing(){
if(i<text.length){
element.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,speed);
}}
typing();
}
